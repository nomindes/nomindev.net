<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コマンドリスト</title>
  <link rel="stylesheet" href="commands.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">ホーム</a></li>
        <li><a href="commands.html">コマンドリスト</a></li>
        <li><a href="links.html">リンク集</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h1>コマンドリスト</h1>
    <table>
      <tr>
        <th>コマンド</th>
        <th>説明</th>
      </tr>
      <tr>
        <td>/anvil</td>
        <td>金床を開きます</td>
      </tr>
      <tr>
        <td>/brewing</td>
        <td>醸造台を開きます</td>
      </tr>
      <tr>
        <td>/cartography</td>
        <td>製図台を開きます</td>
      </tr>
      <tr>
        <td>/craft</td>
        <td>作業台を開きます</td>
      </tr>
      <tr>
        <td>/enchanttable</td>
        <td>エンチャント台を開きます</td>
      </tr>
      <tr>
        <td>/enderchest [player]</td>
        <td>エンダーチェストを開きます</td>
      </tr>
      <tr>
        <td>/grindstone</td>
        <td>砥石を開きます</td>
      </tr>
      <tr>
        <td>/loom</td>
        <td>機織り機を開きます</td>
      </tr>
      <tr>
        <td>/stonecutter</td>
        <td>石切台を開きます</td>
      </tr>
      <tr>
        <td>/furnace</td>
        <td>かまどを開きます</td>
      </tr>
      <tr>
        <td>/blastfurnace</td>
        <td>溶鉱炉を開きます</td>
      </tr>
      <tr>
        <td>/smoker</td>
        <td>燻製器を開きます</td>
      </tr>
    </table>
  </main>
</body>
</html>
